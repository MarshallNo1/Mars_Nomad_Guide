<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="marsBody" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f3a26b"/>
      <stop offset="55%" stop-color="#d65a36"/>
      <stop offset="100%" stop-color="#8a2e16"/>
    </radialGradient>
    <radialGradient id="marsHighlight" cx="32%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#ffd9b8" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#ffd9b8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 球體 -->
  <circle cx="32" cy="32" r="28" fill="url(#marsBody)"/>
  <!-- 高光 -->
  <circle cx="32" cy="32" r="28" fill="url(#marsHighlight)"/>
  <!-- Valles Marineris：橫向細裂痕 -->
  <path d="M14 36 Q 28 33 50 36" stroke="#5a1d0e" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.55"/>
  <!-- 隕石坑 -->
  <circle cx="22" cy="24" r="2" fill="#5a1d0e" opacity="0.45"/>
  <circle cx="44" cy="42" r="2.6" fill="#5a1d0e" opacity="0.4"/>
  <circle cx="38" cy="22" r="1.4" fill="#5a1d0e" opacity="0.4"/>
  <!-- 極冠（北極小白點） -->
  <ellipse cx="32" cy="9" rx="6" ry="2.2" fill="#f9efe2" opacity="0.55"/>
</svg>
